<!DOCTYPE html>
<html lang="ja" data-lang="ja" data-theme="light">
<head>
  <script>!function(){var t=localStorage.getItem('ssl-theme')||'light',l=localStorage.getItem('ssl-lang')||'ja';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-lang',l);document.documentElement.lang=l;}();</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ページが見つかりません | 株式会社エスエスライン</title>
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#0a3d2e" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a3d2e'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%234ade9a' font-size='18' font-weight='900' font-family='sans-serif'>S</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gd:#0a3d2e;--mint:#4ade9a;--mintd:#2bc97a;--bg:#ffffff;--t1:#0f1a0f;--t2:#3a4d3a;--t3:#617361;}
[data-theme="dark"]{--bg:#0b1a0e;--t1:#d4e8cc;--t2:#7ba87e;--t3:#71917a;}
html[data-lang="en"] .lang-jp{display:none!important}
html[data-lang="ja"] .lang-en{display:none!important}
body{font-family:'Noto Sans JP',system-ui,-apple-system,'Meiryo',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;transition:background-color .3s ease,color .3s ease}
.code{font-size:clamp(4rem,18vw,9rem);font-weight:900;line-height:1;color:var(--mint);letter-spacing:-.04em}
h1{font-size:clamp(1.1rem,3vw,1.5rem);font-weight:800;margin:.5rem 0 .75rem}
p{font-size:.9rem;color:var(--t3);max-width:420px;line-height:1.7;margin-bottom:2rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--mint);color:var(--gd);font-weight:700;font-size:.85rem;padding:.7rem 1.6rem;border-radius:4px;text-decoration:none;transition:background .2s,transform .2s}
.btn:hover{background:var(--mintd);transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1><span class="lang-jp">ページが見つかりませんでした</span><span class="lang-en">Page Not Found</span></h1>
  <p><span class="lang-jp">お探しのページは移動または削除された可能性があります。URL をご確認いただくか、トップページからお探しください。</span><span class="lang-en">The page you're looking for may have moved or been removed. Please check the URL, or head back to the homepage.</span></p>
  <a class="btn" href="/ssline-redesign/">← <span class="lang-jp">トップページへ戻る</span><span class="lang-en">Back to home</span></a>
</body>
</html>
